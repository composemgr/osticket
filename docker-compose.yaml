# nginx proxy address - http://172.17.0.1:8089

name: osticket
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  osticket:
    image: osticket/osticket:latest
    pull_policy: always
    container_name: osticket-app
    restart: always
    logging: *default-logging
    networks:
      - osticket
      - proxy
      - cloudflare
    ports:
      - "172.17.0.1:8089:80"
    environment:
      TZ: ${TZ:-America/New_York}
      MYSQL_HOST: osticket-db
      MYSQL_DATABASE: ${DB_CREATE_DATABASE_NAME:-osticket}
      MYSQL_USER: ${DB_USER_NAME:-osticket}
      MYSQL_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MYSQL_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
      SMTP_HOST: ${EMAIL_SERVER_HOST:-172.17.0.1}
      SMTP_PORT: ${EMAIL_SERVER_PORT:-587}
      SMTP_FROM: ${EMAIL_SERVER_MAIL_FROM:-support@example.com}
      SMTP_TLS: "1"
      CONTAINER_NAME: osticket-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    volumes:
      - ./volumes/data/osticket:/data
      - ./volumes/config/osticket:/var/www/html/upload/include/ost-config.php
    depends_on:
      - osticket-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://osticket-app:80'
      - 'cloudflare.hostname=osticket.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.osticket-app.entrypoints=http'
      - 'traefik.http.routers.osticket-app-secure.tls=true'
      - 'traefik.http.routers.osticket-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.osticket-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.osticket-app.middlewares=osticket-app-https-redirect'
      - 'traefik.http.routers.osticket-app-secure.entrypoints=https'
      - 'traefik.http.routers.osticket-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.osticket-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.osticket-app-secure.service=osticket-app'
      - 'traefik.http.services.osticket-app.loadbalancer.server.port=80'

  osticket-db:
    image: mariadb:latest
    pull_policy: always
    container_name: osticket-db
    restart: always
    logging: *default-logging
    networks:
      - osticket
    environment:
      TZ: ${TZ:-America/New_York}
      MARIADB_DATABASE: ${DB_CREATE_DATABASE_NAME:-osticket}
      MARIADB_USER: ${DB_USER_NAME:-osticket}
      MARIADB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MARIADB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
      CONTAINER_NAME: osticket-db
    volumes:
      - ./volumes/data/db/mariadb/osticket:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  osticket:
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
